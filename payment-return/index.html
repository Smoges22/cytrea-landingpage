<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cytrea Checkout</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff8f0;
        color: #12263a;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(440px, 100%);
        background: #ffffff;
        border: 1px solid #ead7bd;
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 16px 50px rgba(18, 38, 58, 0.12);
      }
      .eyebrow {
        margin: 0 0 8px;
        color: #d98219;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        line-height: 1.1;
      }
      p {
        margin: 0 0 22px;
        color: #667085;
        font-size: 17px;
        line-height: 1.45;
      }
      a {
        display: inline-flex;
        width: 100%;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        background: #0f8f8f;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Cytrea checkout</p>
      <h1 id="title">Payment submitted</h1>
      <p id="message">Return to Cytrea to refresh your billing and contact status.</p>
      <a id="open-app" href="cytrea://payment-return">Open Cytrea</a>
    </main>
    <script>
      (function () {
        var query = window.location.search || "";
        var params = new URLSearchParams(query);
        var isCancel = params.get("checkout_status") === "cancel";
        var appUrl = "cytrea://payment-return" + query;
        var link = document.getElementById("open-app");

        if (isCancel) {
          document.title = "Checkout Not Completed | Cytrea";
          document.getElementById("title").textContent = "Checkout not completed";
          document.getElementById("message").textContent =
            "Return to Cytrea to continue checkout when you are ready.";
        }

        link.href = appUrl;
        window.setTimeout(function () {
          window.location.href = appUrl;
        }, 250);
      })();
    </script>
  </body>
</html>
